services:
  db:
    image: postgres:16
    container_name: discord-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discordbot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-discordbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rss-bridge:
    image: rssbridge/rss-bridge:latest
    container_name: rss-bridge
    restart: unless-stopped
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: discord-bot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - prod

  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:1200',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - prod

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-x-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rss-bridge:
        condition: service_healthy
      redis:
        condition: service_healthy
      rsshub:
        condition: service_healthy
    environment:
      DISCORD__TOKEN: ${DISCORD_TOKEN}
      DISCORD__DEVGUILDID: ${DISCORD_GUILD_ID}
      CONNECTIONSTRINGS__DEFAULT: Host=db;Port=5432;Database=${POSTGRES_DB:-discordbot};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      RSSBRIDGE__BASEURL: http://rss-bridge:80
      FEEDPROVIDERS__ENABLEDIRECTRSS: ${FEEDPROVIDERS__ENABLEDIRECTRSS:-true}
      FEEDPROVIDERS__ENABLERSSHUB: ${FEEDPROVIDERS__ENABLERSSHUB:-false}
      FEEDPROVIDERS__RSSHUBBASEURL: ${FEEDPROVIDERS__RSSHUBBASEURL:-http://rsshub:1200}
      FEEDPROVIDERS__DEFAULTXPROVIDER: ${FEEDPROVIDERS__DEFAULTXPROVIDER:-RssBridge}
      FEEDPROVIDERS__DEFAULTFACEBOOKPROVIDER: ${FEEDPROVIDERS__DEFAULTFACEBOOKPROVIDER:-RssHub}
      POLLING__INTERVALMINUTES: ${POLLING__INTERVALMINUTES:-10}
      POLLING__MAXITEMSPERFEED: ${POLLING__MAXITEMSPERFEED:-5}
      RETRY__MAXRETRIES: ${RETRY__MAXRETRIES:-3}
      RETRY__PUBLISHMAXRETRIES: ${RETRY__PUBLISHMAXRETRIES:-2}
      RETRY__INITIALDELAYSECONDS: ${RETRY__INITIALDELAYSECONDS:-2}
      PUBLISH__MAXCONCURRENTPUBLISHES: ${PUBLISH__MAXCONCURRENTPUBLISHES:-2}
      PUBLISH__INTERPUBLISHDELAYMS: ${PUBLISH__INTERPUBLISHDELAYMS:-200}
      PUBLISH__MAXADDITIONALIMAGES: ${PUBLISH__MAXADDITIONALIMAGES:-3}
    profiles:
      - prod

volumes:
  postgres-data:
