services:
  db:
    image: postgres:16
    container_name: discord-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discordbot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-discordbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rss-bridge:
    image: rssbridge/rss-bridge:latest
    container_name: rss-bridge
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "3000:80"
    volumes:
      - ./.config/rss-bridge/config.ini.php:/config/config.ini.php:ro
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-x-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rss-bridge:
        condition: service_healthy
    environment:
      DISCORD__TOKEN: ${DISCORD_TOKEN}
      DISCORD__DEVGUILDID: ${DISCORD_GUILD_ID}
      CONNECTIONSTRINGS__DEFAULT: ${CONNECTIONSTRINGS__DEFAULT}
      RSSBRIDGE__BASEURL: ${RSSBRIDGE__BASEURL}
      FEEDPROVIDERS__ENABLEDIRECTRSS: ${FEEDPROVIDERS__ENABLEDIRECTRSS:-true}
      FEEDPROVIDERS__DEFAULTXPROVIDER: ${FEEDPROVIDERS__DEFAULTXPROVIDER:-RssBridge}
      FEEDPROVIDERS__DEFAULTFACEBOOKPROVIDER: ${FEEDPROVIDERS__DEFAULTFACEBOOKPROVIDER:-RssBridge}
      FEEDPROVIDERS__ENABLEFACEBOOKPROFILEALERTS: ${FEEDPROVIDERS__ENABLEFACEBOOKPROFILEALERTS:-false}
      FEEDPROVIDERS__FACEBOOKPROFILEALERTCHANNELID: ${FEEDPROVIDERS__FACEBOOKPROFILEALERTCHANNELID:-0}
      FEEDPROVIDERS__FACEBOOKPROFILEFAILURETHRESHOLD: ${FEEDPROVIDERS__FACEBOOKPROFILEFAILURETHRESHOLD:-3}
      FEEDPROVIDERS__FACEBOOKPROFILEALERTCOOLDOWNMINUTES: ${FEEDPROVIDERS__FACEBOOKPROFILEALERTCOOLDOWNMINUTES:-180}
      APIFYFALLBACK__ENABLED: ${APIFYFALLBACK__ENABLED:-false}
      APIFYFALLBACK__APIBASEURL: ${APIFYFALLBACK__APIBASEURL:-https://api.apify.com/v2}
      APIFYFALLBACK__APITOKEN: ${APIFYFALLBACK__APITOKEN:-}
      APIFYFALLBACK__ACTORID: ${APIFYFALLBACK__ACTORID:-apify/facebook-posts-scraper}
      APIFYFALLBACK__RESULTSLIMIT: ${APIFYFALLBACK__RESULTSLIMIT:-5}
      APIFYFALLBACK__REQUESTTIMEOUTSECONDS: ${APIFYFALLBACK__REQUESTTIMEOUTSECONDS:-45}
      APIFYFALLBACK__POLLINTERVALSECONDS: ${APIFYFALLBACK__POLLINTERVALSECONDS:-5}
      APIFYFALLBACK__MAXPOLLATTEMPTS: ${APIFYFALLBACK__MAXPOLLATTEMPTS:-24}
      APIFYFALLBACK__FAILURETHRESHOLD: ${APIFYFALLBACK__FAILURETHRESHOLD:-3}
      APIFYFALLBACK__COOLDOWNMINUTES: ${APIFYFALLBACK__COOLDOWNMINUTES:-180}
      APIFYFALLBACK__ENABLEFORFANPAGE: ${APIFYFALLBACK__ENABLEFORFANPAGE:-true}
      APIFYFALLBACK__ENABLEFORPROFILE: ${APIFYFALLBACK__ENABLEFORPROFILE:-true}
      RSSBRIDGEFALLBACK__ENABLED: ${RSSBRIDGEFALLBACK__ENABLED:-false}
      RSSBRIDGEFALLBACK__FAILURETHRESHOLD: ${RSSBRIDGEFALLBACK__FAILURETHRESHOLD:-2}
      RSSBRIDGEFALLBACK__COOLDOWNMINUTES: ${RSSBRIDGEFALLBACK__COOLDOWNMINUTES:-60}
      RSSBRIDGEFALLBACK__ENABLEFORFANPAGE: ${RSSBRIDGEFALLBACK__ENABLEFORFANPAGE:-true}
      RSSBRIDGEFALLBACK__ENABLEFORPROFILE: ${RSSBRIDGEFALLBACK__ENABLEFORPROFILE:-false}
      POLLING__INTERVALMINUTES: ${POLLING__INTERVALMINUTES:-10}
      POLLING__MAXITEMSPERFEED: ${POLLING__MAXITEMSPERFEED:-5}
      RETRY__MAXRETRIES: ${RETRY__MAXRETRIES:-3}
      RETRY__PUBLISHMAXRETRIES: ${RETRY__PUBLISHMAXRETRIES:-2}
      RETRY__INITIALDELAYSECONDS: ${RETRY__INITIALDELAYSECONDS:-2}
      PUBLISH__MAXCONCURRENTPUBLISHES: ${PUBLISH__MAXCONCURRENTPUBLISHES:-2}
      PUBLISH__INTERPUBLISHDELAYMS: ${PUBLISH__INTERPUBLISHDELAYMS:-200}
      PUBLISH__MAXADDITIONALIMAGES: ${PUBLISH__MAXADDITIONALIMAGES:-3}
    profiles:
      - prod

volumes:
  postgres-data:
